app = "biljeske-sync"
primary_region = "fra"

[build]

[env]
  BILJESKE_DATA_DIR = "/data"

[[mounts]]
  source = "biljeske_data"
  destination = "/data"

[http_service]
  internal_port = 8080
  force_https = true
  auto_stop_machines = "stop"
  auto_start_machines = true
  min_machines_running = 0

  [http_service.concurrency]
    type = "requests"
    soft_limit = 50
    hard_limit = 100

[[vm]]
  size = "shared-cpu-1x"
  memory = "256mb"
